<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thamirys & Giovani - Casamento - 10/08/2026</title>
    <style>
        /* --- ESTILOS GLOBAIS E VARIÁVEIS DE COR (PALETA CINNAMON) --- */
        :root {
            --color-cinnamon: #8B4513; /* Cor principal, marrom/dourado */
            --color-cinnamon-dark: #654321;
            --color-footer-band: #A0522D; /* Faixa de rodapé marrom-avermelhada */
            --color-background-cream: #fdfaf8; /* Fundo artesanal creme claro */
            --color-white: #ffffff;
            --color-black: #000000;
            --font-main: 'Montserrat', sans-serif;
            --font-titles: 'Playfair Display', serif;
            --font-script: 'Cinzel Decorative', serif; /* Para o nome grande e elegante */
        }

        /* Fontes externas - Simulações de fontes de imagem de alta qualidade */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@400;700&family=Cinzel+Decorative:wght@400&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: #f1f1f1; /* Fundo para simulação do telefone */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Impede rolagem na página principal da simulação */
        }

        /* --- MOLDURA DO TELEFONE (Simulação de iPhone X/11/12/13/14) --- */
        .phone-simulation {
            width: 375px; /* Largura padrão */
            height: 812px;
            background-color: var(--color-black);
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 15px solid var(--color-black);
        }

        /* Notch superior */
        .phone-simulation .notch {
            width: 50%;
            height: 30px;
            background-color: var(--color-black);
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 10;
        }

        /* Barra de status fictícia do navegador no telefone */
        .phone-browser-bar {
            background-color: #eee;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px 0;
            font-size: 14px;
            font-weight: bold;
            z-index: 9;
        }
        .phone-status-info {
             width: 100%;
             display: flex;
             justify-content: space-between;
             padding: 0 15px;
        }
        .phone-status-info .browser-url {
            color: #555;
            font-weight: normal;
        }
        .phone-status-info .lock-icon {
            margin-right: 5px;
        }

        /* --- CONTEÚDO DO SITE (Responsivo e Clean) --- */
        .site-container {
            flex-grow: 1;
            background-color: var(--color-background-cream);
            display: flex;
            flex-direction: column;
            overflow-y: auto; /* Permite rolar o conteúdo do site */
            -webkit-overflow-scrolling: touch;
        }

        /* Cabeçalho do Site */
        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background-color: var(--color-white);
            color: var(--color-cinnamon);
            font-size: 14px;
        }

        .hamburger-menu {
            font-size: 20px;
            color: var(--color-cinnamon);
        }

        .countdown-container {
            text-align: center;
        }

        .date-display {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .date-number {
            font-family: var(--font-titles);
            font-size: 36px;
            font-weight: bold;
        }
        .date-text {
            font-size: 12px;
            text-transform: uppercase;
        }

        .search-icon {
            font-size: 18px;
            color: var(--color-cinnamon);
        }

        /* Banner Floral */
        .floral-banner {
            background-color: var(--color-background-cream);
            padding: 40px 20px;
            text-align: center;
            position: relative;
        }

        /* Imagem de fundo floral representativa de pampas grass e flores */
        .floral-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://www.transparentpng.com/download/watercolor-flower/watercolor-flower-png-floral-art-free-download-23.png'); /* URL fictícia de alta qualidade */
            background-size: cover;
            background-position: center top;
            opacity: 0.15; /* Suave para simular aquarela em papel */
            z-index: 0;
        }

        .couple-names {
            font-family: var(--font-script);
            font-size: 40px;
            color: var(--color-cinnamon);
            position: relative;
            z-index: 1;
            margin-bottom: 5px;
        }

        .wedding-date-banner {
            font-size: 14px;
            color: var(--color-cinnamon);
            position: relative;
            z-index: 1;
        }

        /* Divisor Cinnamon */
        .site-main .divider {
            height: 2px;
            background-color: var(--color-cinnamon);
            margin: 0 20px;
        }

        /* Menu de Navegação (Grelha de 4 itens) */
        .site-nav {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-gap: 20px;
            padding: 30px;
            background-color: var(--color-white);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .nav-item:hover {
            background-color: #fafafa;
        }

        .nav-icon {
            width: 40px;
            height: 40px;
            margin-bottom: 15px;
            fill: var(--color-cinnamon);
        }

        .nav-title {
            font-family: var(--font-titles);
            color: var(--color-cinnamon);
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .nav-description {
            font-size: 12px;
            color: #777;
            white-space: pre-line; /* Permite novas linhas na descrição */
        }

        /* Rodapé do Site */
        .site-footer {
            height: 50px;
            background-color: var(--color-footer-band);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: auto; /* Empurra para o final do site container */
        }

        /* Imagem de cadeado representativa */
        .site-footer .lock-icon {
            width: 15px;
            height: 15px;
            fill: var(--color-white);
        }

        /* ADAPTAÇÕES ESPECÍFICAS DE RECRIAÇÃO DA IMAGEM */
        /* Recriação do cadeado pequeno na faixa marrom inferior */
        .site-footer {
            justify-content: center;
            align-items: center;
            display: flex;
            background-color: var(--color-footer-band);
        }
        .site-footer .small-lock {
            width: 14px;
            height: 18px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path fill="%23FFFFFF" d="M144 192V144C144 64.47 208.5 0 288 0C367.5 0 432 64.47 432 144V192H448C465.7 192 480 206.3 480 224V480C480 497.7 465.7 512 448 512H32C14.33 512 0 497.7 0 480V224C0 206.3 14.33 192 32 192H144zM320 192V144C320 117.5 298.5 96 272 96C245.5 96 224 117.5 224 144V192H320z"></path></svg>');

            margin-right: 0;
            margin-bottom: -5px; /* Ajuste para centralizar visualmente na faixa */
        }

        /* --- ELEMENTOS DE DECORAÇÃO DA MESA --- */
        .decor-pampas {
            position: fixed;
            top: 50px;
            right: 50px;
            width: 250px;
            transform: rotate(15deg);
            opacity: 0.7;
            z-index: -1;
        }
        .decor-flowers {
            position: fixed;
            bottom: 50px;
            left: 50px;
            width: 200px;
            transform: rotate(-10deg);
            opacity: 0.6;
            z-index: -1;
        }
        .mesa-madeira {

            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://www.transparentpng.com/download/wooden-background/rustic-wood-plank-texture-background-photo-14.png'); /* URL fictícia de alta qualidade */
            background-size: cover;
            opacity: 0.1;
            z-index: -2;
        }

    </style>
</head>
